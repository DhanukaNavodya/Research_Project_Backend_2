name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          EC2_APP_DIR: "/srv/research-backend"
          S3_BUCKET: "${{ secrets.S3_BUCKET }}"
          S3_PREFIX: "${{ secrets.S3_PREFIX }}"
          APP_SERVICE: "research-backend"
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: EC2_APP_DIR,S3_BUCKET,S3_PREFIX,APP_SERVICE
          script: |
            set -e
            cd "${EC2_APP_DIR}"
            bash scripts/ec2_deploy.sh
